<!--
=======================================================
  SECRET HOUR — SCHEMA MARKUP (JSON-LD)
  Drop each block into the <head> of the relevant page.
  Test at: https://search.google.com/test/rich-results
=======================================================
-->


<!-- ====================================================
  1. ORGANIZATION SCHEMA — place in <head> of ALL pages
     Helps Google/AI understand your brand as an entity.
===================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Secret Hour",
  "url": "https://secrethour.pk",
  "logo": "https://secrethour.pk/logo.png",
  "description": "Quietly luxurious gifts crafted for married couples in Pakistan — card games, candles, and intimate sets to slow down, come closer, and reconnect.",
  "foundingLocation": {
    "@type": "Place",
    "name": "Pakistan"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "contactType": "customer service",
    "email": "info@secrethour.pk",
    "availableLanguage": ["English", "Urdu"]
  },
  "sameAs": [
    "https://www.instagram.com/secrethour.pk",
    "https://www.facebook.com/people/Secret-Hour/61585460425456/"
  ],
  "areaServed": {
    "@type": "Country",
    "name": "Pakistan"
  }
}
</script>


<!-- ====================================================
  2. WEBSITE SCHEMA — place in <head> of homepage only
     Enables a Google sitelinks search box.
===================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Secret Hour",
  "url": "https://secrethour.pk",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://secrethour.pk/shop?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>

<!-- ====================================================
  6. FAQPAGE SCHEMA — place in <head> of /info/faq
     Makes Q&A appear directly in Google search results
     and makes answers citable by AI systems.
===================================================== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Is the packaging discreet?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. All Secret Hour orders are shipped in plain, unmarked packaging with no external branding or indication of contents. The sender name on the waybill reads 'Secret Hour' only — nothing else."
      }
    },
    {
      "@type": "Question",
      "name": "How long does delivery take?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Delivery across Pakistan typically takes 2–5 business days depending on your city. Major cities like Karachi, Lahore, and Islamabad usually receive orders within 2–3 business days. We offer free delivery across Pakistan on all orders."
      }
    },
    {
      "@type": "Question",
      "name": "What payment options are available?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We accept Cash on Delivery (COD) across Pakistan, and online bank transfers. Paying via bank transfer gives you an additional 10% discount on your order."
      }
    },
    {
      "@type": "Question",
      "name": "Is Secret Hour suitable for newly married couples?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, Secret Hour products are designed specifically with married couples in mind — including those recently wed. The Midnight Deck and Bridal Box are especially popular as wedding night gifts and nikkah gifts in Pakistan."
      }
    },
    {
      "@type": "Question",
      "name": "What if we have been married for years?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Secret Hour is for every stage of marriage. Our products are designed to help couples reconnect and rediscover each other regardless of how long they have been together. Many customers are couples looking to break out of routine and bring more intentionality into their relationship."
      }
    },
    {
      "@type": "Question",
      "name": "Can I return a product?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We accept returns within 7 days of delivery if the product is unopened and in original condition. Please contact us at info@secrethour.pk to initiate a return. See our full Returns & Exchange policy for details."
      }
    },
    {
      "@type": "Question",
      "name": "Do I need guidance to use the products?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No guidance is needed. The Midnight Deck comes with clear instructions inside the box. All products are designed to be intuitive and easy to use from the moment you open them."
      }
    },
    {
      "@type": "Question",
      "name": "How can I contact Secret Hour?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "You can reach us via email at info@secrethour.pk, through our WhatsApp contact link on the website, or via our contact form at secrethour.pk/contact. We aim to respond within 24 hours."
      }
    },
    {
      "@type": "Question",
      "name": "What if I feel unsure before buying?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "You can take our free Experience Quiz at secrethour.pk/quiz to find the best product for your situation in under a minute. You can also WhatsApp us directly and we will help you choose — no pressure."
      }
    },
    {
      "@type": "Question",
      "name": "Is Secret Hour available across all of Pakistan?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. We ship to all cities across Pakistan including Karachi, Lahore, Islamabad, Rawalpindi, Faisalabad, Multan, Peshawar, Quetta, and beyond. Delivery is always free."
      }
    }
  ]
}
</script>
